<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>

body{
    font-family:Poppins,sans-serif;
    background:#eef8ee;
    padding:40px;
}

h1{
    color:#2e7d32;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th{
    background:#2e7d32;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

button{
    background:#2e7d32;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

.remove-btn{
    background:#c62828;
}

.checkout-btn{
    margin-top:25px;
    font-size:18px;
}

</style>

</head>

<body>

<h1>🛒 My Shopping Cart</h1>

<table>

<thead>

<tr>

<th>ID</th>
<th>Product ID</th>
<th>Buyer</th>
<th>Quantity</th>
<th>Action</th>

</tr>

</thead>

<tbody id="cartTable">

</tbody>

</table>

<button class="checkout-btn" onclick="checkout()">
Checkout
</button>

<script>

const CART_API= "https://verified-organic-platform.onrender.com/cart";;
const ORDER_API="https://verified-organic-platform.onrender.com/orders";

async function loadCart(){

    const response = await fetch(CART_API);

    const items = await response.json();

    const table = document.getElementById("cartTable");

    table.innerHTML="";

    items.forEach(item=>{

        table.innerHTML += `
        <tr>

            <td>${item.id}</td>

            <td>${item.product_id}</td>

            <td>${item.buyer_name}</td>

            <td>${item.quantity}</td>

            <td>

                <button
                class="remove-btn"
                onclick="removeItem(${item.id})">
                Remove
                </button>

            </td>

        </tr>
        `;

    });

}

async function removeItem(id){

    const response = await fetch(`${CART_API}/${id}`,{
        method:"DELETE"
    });

    if(response.ok){

        alert("Item Removed");

        loadCart();

    }

}

async function checkout(){

    const buyer = localStorage.getItem("user_name");

    if(!buyer){

        alert("Please login first.");

        return;

    }

    const cartResponse = await fetch(CART_API);

    const cartItems = await cartResponse.json();

    const myCart = cartItems.filter(
        item => item.buyer_name === buyer
    );

    if(myCart.length===0){

        alert("Your cart is empty.");

        return;

    }

    for(const item of myCart){

        await fetch(ORDER_API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({

                buyer_name:item.buyer_name,
                product_id:item.product_id,
                quantity:item.quantity,
                status:"Pending"

            })
        });

    }

    await fetch(`${CART_API}/clear/${buyer}`,{

        method:"DELETE"

    });

    alert("🎉 Order Placed Successfully!");

    loadCart();

}

loadCart();

</script>

</body>
</html>
