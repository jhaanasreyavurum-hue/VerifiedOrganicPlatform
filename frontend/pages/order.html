<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#eef8ee;
padding:40px;
}

h1{
color:#2e7d32;
margin-bottom:30px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

th{
background:#2e7d32;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

.back-btn{
display:inline-block;
margin-top:25px;
background:#2e7d32;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:8px;
}

</style>

</head>

<body>

<h1>📦 My Orders</h1>

<table>

<thead>

<tr>

<th>Order ID</th>
<th>Product ID</th>
<th>Quantity</th>
<th>Status</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

<a class="back-btn" href="farmer.html">

⬅ Back to Dashboard

</a>

<script>

const buyer = localStorage.getItem("user_name");

if(!buyer){

    alert("Please login first.");

    window.location.href="login.html";

}

async function loadOrders(){

    const response = await fetch("https://verified-organic-platform.onrender.com/orders"/{buyer});

    const orders = await response.json();

    const table = document.getElementById("ordersTable");

    table.innerHTML = "";

    if(orders.length===0){

        table.innerHTML = `
        <tr>
            <td colspan="4">
            No Orders Found
            </td>
        </tr>
        `;

        return;

    }

    orders.forEach(order=>{

        table.innerHTML += `
        <tr>

            <td>${order.id}</td>

            <td>${order.product_id}</td>

            <td>${order.quantity}</td>

            <td>${order.status}</td>

        </tr>
        `;

    });

}

loadOrders();

</script>

</body>

</html>
