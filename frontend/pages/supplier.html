<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplier Dashboard</title>
<link rel="stylesheet" href="../css/style.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#eef8ee;display:flex}
.sidebar{width:250px;height:100vh;background:#2e7d32;color:#fff;padding-top:30px;position:fixed}
.sidebar h2{text-align:center;margin-bottom:20px}
.sidebar a{display:block;color:#fff;padding:16px 28px;text-decoration:none}
.sidebar a:hover{background:#1b5e20}
.main{margin-left:250px;padding:40px;width:100%}
.form-box{background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.15);margin-bottom:20px}
input{width:100%;padding:10px;margin:8px 0}
button{padding:10px 16px;margin:4px;border:none;border-radius:6px;color:#fff;background:#2e7d32;cursor:pointer}
.edit-btn{background:#1976d2}
.delete-btn{background:#c62828}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#2e7d32;color:#fff}
</style>
</head>
<body>
<div class="sidebar">
<h2>🏭 Supplier</h2>
<a href="../index.html">Home</a>
<a href="products.html">Products</a>
<a href="#" onclick="logout()">Logout</a>
</div>
<div class="main">
<h1 id="welcomeMessage">Welcome Supplier</h1>

<div class="form-box">
<h2 id="formTitle">Add New Product</h2>
<form id="productForm">
<input type="text" id="name" placeholder="Name" required>
<input type="text" id="description" placeholder="Description" required>
<input type="number" id="price" placeholder="Price" required>
<input type="text" id="category" placeholder="Category" required>
<input type="text" id="supplier" placeholder="Supplier" required>
<input type="number" id="stock" placeholder="Stock" required>
<input type="text" id="image" placeholder="Image URL" required>
<button type="submit" id="saveBtn">Save Product</button>
<button type="button" id="cancelBtn" style="display:none;background:#777">Cancel</button>
</form>
</div>
<div style="margin-bottom:20px;">
    <input
        type="text"
        id="searchInput"
        placeholder="Search Product..."
        onkeyup="searchProducts()"
        style="width:300px;padding:10px;">
</div>

<table>
<thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Action</th></tr></thead>
<tbody id="productTable"></tbody>
</table>
<h2 style="margin-top:40px;color:#2e7d32;">
Customer Orders
</h2>

<table>

<thead>

<tr>

<th>Order ID</th>
<th>Buyer</th>
<th>Product ID</th>
<th>Quantity</th>
<th>Status</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>
<br><br>

<h2>Customer Orders</h2>

<table>

<thead>

<tr>

<th>Order ID</th>
<th>Buyer</th>
<th>Product</th>
<th>Quantity</th>
<th>Total Price</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>
</div>

<script>
const API_URL= "https://verified-organic-platform.onrender.com/products";
let editingProductId=null;
document.getElementById("welcomeMessage").textContent="Welcome Supplier "+(localStorage.getItem("user_name")||"");

function logout(){

    localStorage.removeItem("token");
    localStorage.removeItem("user_name");
    localStorage.removeItem("role");

    window.location.replace("login.html");

}

async function loadProducts(){
 const res=await fetch(API_URL);
 const products=await res.json();
 const tb=document.getElementById("productTable");
 tb.innerHTML="";
 products.forEach(p=>{
 tb.innerHTML+=`<tr>
 <td>${p.id}</td><td>${p.name}</td><td>₹${p.price}</td><td>${p.stock}</td>
 <td>
 <button class="edit-btn" onclick="editProduct(${p.id})">Edit</button>
 <button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>
 </td></tr>`;
 });
}
async function searchProducts(){

    const keyword =
        document.getElementById("searchInput").value;

    if(keyword===""){

        loadProducts();
        return;

    }

    const response = await fetch(
        `${API_URL}/search?keyword=${keyword}`
    );

    const products = await response.json();

    const table =
        document.getElementById("productTable");

    table.innerHTML="";

    products.forEach(product=>{

        table.innerHTML += `
        <tr>
            <td>${product.id}</td>
            <td>${product.name}</td>
            <td>₹${product.price}</td>
            <td>${product.stock}</td>
            <td>
                <button
                    class="edit-btn"
                    onclick="editProduct(${product.id})">
                    Edit
                </button>

                <button
                    class="delete-btn"
                    onclick="deleteProduct(${product.id})">
                    Delete
                </button>
            </td>
        </tr>
        `;

    });

}

async function editProduct(id){
 const r=await fetch(`${API_URL}/${id}`);
 const p=await r.json();
 editingProductId=id;
 ["name","description","price","category","supplier","stock","image"].forEach(k=>document.getElementById(k).value=p[k]);
 document.getElementById("formTitle").textContent="Update Product";
 document.getElementById("saveBtn").textContent="Update Product";
 document.getElementById("cancelBtn").style.display="inline-block";
}

async function deleteProduct(id){
 if(!confirm("Delete this product?")) return;
 const r=await fetch(`${API_URL}/${id}`,{method:"DELETE"});
 if(r.ok){alert("Deleted");loadProducts();} else alert("Delete failed");
}

document.getElementById("cancelBtn").onclick=()=>{
 editingProductId=null;
 document.getElementById("productForm").reset();
 document.getElementById("formTitle").textContent="Add New Product";
 document.getElementById("saveBtn").textContent="Save Product";
 document.getElementById("cancelBtn").style.display="none";
};

document.getElementById("productForm").onsubmit=async(e)=>{
 e.preventDefault();
 const product={};
 ["name","description","category","supplier","image"].forEach(k=>product[k]=document.getElementById(k).value);
 product.price=Number(document.getElementById("price").value);
 product.stock=Number(document.getElementById("stock").value);
 const url=editingProductId?`${API_URL}/${editingProductId}`:API_URL;
 const method=editingProductId?"PUT":"POST";
 const r=await fetch(url,{method,headers:{"Content-Type":"application/json"},body:JSON.stringify(product)});
 if(r.ok){

    alert(editingProductId ? "Updated Successfully" : "Product Added Successfully");

    editingProductId = null;

    document.getElementById("cancelBtn").click();

    loadProducts();

}else{

    const error = await r.text();

    alert(error);

}
};
async function loadOrders(){

    const response = await fetch(
         "https://verified-organic-platform.onrender.com/orders/all/orders"
    );}

    if(!response.ok){

        alert("Unable to load orders.");

        return;

    }

    const orders = await response.json();

    const table = document.getElementById("ordersTable");

    table.innerHTML = "";

    orders.forEach(order=>{

    table.innerHTML += `
    <tr>

        <td>${order.id}</td>

        <td>${order.buyer_name}</td>

        <td>${order.product_name}</td>

        <td>${order.quantity}</td>

        <td>₹${order.total_price}</td>

        <td>

            <select id="status${order.id}">

                <option value="Pending" ${order.status=="Pending"?"selected":""}>Pending</option>

                <option value="Processing" ${order.status=="Processing"?"selected":""}>Processing</option>

                <option value="Shipped" ${order.status=="Shipped"?"selected":""}>Shipped</option>

                <option value="Delivered" ${order.status=="Delivered"?"selected":""}>Delivered</option>

            </select>

        </td>

        <td>

            <button onclick="updateStatus(${order.id})">

                Update

            </button>

        </td>

    </tr>
    `;

});

loadProducts();
loadOrders();
async function updateStatus(orderId){

    const status =
        document.getElementById(`status${orderId}`).value;

    const response = await fetch(

        `https://verified-organic-platform.onrender.com//supplier/orders/${orderId}?status=${status}`,

        {

            method:"PUT"

        }

    );

    if(response.ok){

        alert("Order status updated successfully!");

        loadOrders();

    }
    else{

        alert("Unable to update order status.");

    }

}
</script>
</body>
</html>
