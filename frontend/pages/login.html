<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="../css/style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef8ee;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    width:420px;
    padding:40px;
    border-radius:20px;
    box-shadow:0px 8px 25px rgba(0,0,0,.15);
}

.login-box h1{
    text-align:center;
    color:#2e7d32;
    margin-bottom:30px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1b5e20;
}

.register{
    text-align:center;
    margin-top:20px;
}

.register a{
    text-decoration:none;
    color:#2e7d32;
    font-weight:bold;
}

.back{
    display:block;
    margin-top:20px;
    text-align:center;
    text-decoration:none;
    color:#2e7d32;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<h1>🌱 Login</h1>

<form id="loginForm">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter your password"
required>

<button type="submit">

Login

</button>

</form>

<div class="register">

Don't have an account?

<a href="register.html">

Register Here

</a>

</div>

<a class="back" href="../index.html">

⬅ Back to Home

</a>

</div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    const loginData = {

        email: document.getElementById("email").value,
        password: document.getElementById("password").value

    };

    const response = await fetch( "https://verified-organic-platform.onrender.com/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(loginData)

    });

    const data = await response.json();

    if(data.success){

        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("role", data.user.role);
        localStorage.setItem("user_name", data.user.name);

        alert("Login Successful!");

        if(data.user.role === "farmer"){
            window.location.href="farmer.html";
        }
        else if(data.user.role === "supplier"){
            window.location.href="supplier.html";
        }
        else if(data.user.role === "admin"){
            window.location.href="admin.html";
        }
        else{
            alert("Unknown User Role");
        }

    }
    else{

        alert(data.message);

    }

});

</script>

</body>

</html>
